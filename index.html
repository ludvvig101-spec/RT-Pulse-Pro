<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RT Pulse Pro Enterprise v2.0</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<script src="https://unpkg.com/lucide@latest"></script>

<style>

:root{

--bg:#0B1017;
--bg2:#101823;

--panel:#141C26;
--panel2:#18212D;

--border:#2A3442;

--primary:#3B82F6;
--success:#22C55E;
--warning:#F59E0B;
--danger:#EF4444;

--cyan:#06B6D4;
--purple:#8B5CF6;

--text:#F8FAFC;
--text2:#CBD5E1;
--muted:#94A3B8;

--radius:12px;

--shadow:
0 10px 30px rgba(0,0,0,.35);

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{

height:100%;

background:var(--bg);

color:var(--text);

font-family:
Inter,
Segoe UI,
Roboto,
Arial,
sans-serif;

overflow:hidden;

}

body{

display:flex;

flex-direction:column;

}

::-webkit-scrollbar{

width:8px;
height:8px;

}

::-webkit-scrollbar-thumb{

background:#334155;

border-radius:10px;

}

::-webkit-scrollbar-track{

background:#111827;

}

.enterprise-card{

background:linear-gradient(
180deg,
var(--panel),
var(--panel2)
);

border:1px solid var(--border);

border-radius:var(--radius);

box-shadow:var(--shadow);

transition:.2s;

}

.enterprise-card:hover{

border-color:#3B82F6;

}

.section-title{

font-size:11px;

font-weight:700;

letter-spacing:.12em;

text-transform:uppercase;

color:var(--muted);

margin-bottom:10px;

}

input,
select,
button{

font-family:inherit;

}

button{

transition:.18s;

}

button:hover{

transform:translateY(-1px);

}

.topbar{

height:52px;

background:#111827;

border-bottom:1px solid var(--border);

display:flex;

align-items:center;

justify-content:space-between;

padding:0 18px;

}

.brand{

display:flex;

align-items:center;

gap:10px;

font-size:18px;

font-weight:700;

}

.brand small{

font-size:11px;

color:var(--muted);

font-weight:600;

}

.status-pill{

padding:4px 10px;

border-radius:999px;

background:#163321;

color:#4ADE80;

font-size:11px;

font-weight:700;

}

.footer-bar{

height:30px;

background:#111827;

border-top:1px solid var(--border);

display:flex;

align-items:center;

justify-content:space-between;

padding:0 16px;

font-size:11px;

color:var(--muted);

}

</style>

</head>
